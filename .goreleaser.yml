version: 2

project_name: aj

builds:
  - main: ./cmd/agentjit
    binary: aj
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/agent-jit/agentjit/internal/version.Version={{.Version}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "aj_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "aj_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: agent-jit
    name: AgentJIT

brews:
  - repository:
      owner: agent-jit
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/agent-jit/AgentJIT
    description: "Background JIT compiler for autonomous coding agents"
    license: "MIT"
    install: |
      bin.install "aj"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
